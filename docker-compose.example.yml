services:
  autorip:
    image: ghcr.io/freemkv/autorip:latest
    container_name: autorip
    restart: unless-stopped
    privileged: true                    # required for optical SCSI access
    environment:
      - AUTORIP_DIR=/config
      - OUTPUT_DIR=/output
      - MOVIE_DIR=/output/Movies
      - TV_DIR=/output/TV
      - STAGING_DIR=/staging
      - TMDB_API_KEY=your_tmdb_api_key
      - MIN_LENGTH=600
      - AUTO_EJECT=true
      - ON_INSERT=rip
      - MAX_RETRIES=1                   # 0..=10; retry passes after fast pass (multi-pass rip)
      - KEEP_ISO=false                  # keep intermediate ISO after MKV mux (forensics)
    volumes:
      - /dev:/dev                       # live host /dev — handles USB re-enumeration (sg4 ↔ sg5 between reconnects)
      - ./config:/config
      - /mnt/media:/output
      - /tmp/autorip:/staging
      - /sys:/sys:ro
    ports:
      - 8080:8080

# Optional: if running autorip behind an existing reverse proxy (Caddy /
# Traefik / nginx) on a shared Docker network, override the default network
# so the container joins the existing one instead of getting its own
# stack-local bridge. One network, no duplication.
#
# networks:
#   default:
#     name: your-existing-proxy-net
#     external: true
