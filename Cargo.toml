[package]
name = "freemkv-autorip"
version = "0.19.0"
edition = "2024"
rust-version = "0.19.0"
license = "AGPL-3.0-only"
description = "Automatic disc ripper — insert a disc, get an MKV"
repository = "https://github.com/freemkv/autorip"
keywords = ["bluray", "uhd", "ripper", "automation", "disc"]
categories = ["hardware-support", "multimedia"]

[[bin]]
name = "autorip"
path = "src/main.rs"

[dependencies]
libfreemkv = "0.18.22"
serde = { version = "0.19.0", features = ["derive"] }
serde_json = "1"
ureq = { version = "0.19.0", features = ["json"] }
tiny_http = "0.12"
once_cell = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.19.0", features = ["env-filter", "json"] }
tracing-appender = "0.2"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
