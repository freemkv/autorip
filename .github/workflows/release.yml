name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0
      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VER="v$(grep '^version' autorip/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          if [ "$CARGO_VER" != "${{ github.ref_name }}" ]; then
            echo "::error::Cargo.toml says $CARGO_VER but tag is ${{ github.ref_name }}"
            exit 1
          fi
          echo "Version match: $CARGO_VER"

      - name: Verify Cargo.lock libfreemkv matches tag and is from crates.io
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          python3 - "$TAG_VER" <<'PY'
          import sys, re
          tag = sys.argv[1]
          try:
              with open("autorip/Cargo.lock") as f:
                  text = f.read()
          except FileNotFoundError:
              print("::error::Cargo.lock not found")
              sys.exit(1)
          if not text.strip():
              print("::error::Cargo.lock is empty or truncated")
              sys.exit(1)
          # Split into [[package]] blocks; defend against multiple libfreemkv entries.
          blocks = re.split(r'(?m)^\[\[package\]\]\s*$', text)
          matches = []
          for b in blocks:
              name_m = re.search(r'(?m)^name\s*=\s*"libfreemkv"\s*$', b)
              if not name_m:
                  continue
              ver_m = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', b)
              src_m = re.search(r'(?m)^source\s*=\s*"([^"]+)"\s*$', b)
              matches.append((ver_m.group(1) if ver_m else None,
                              src_m.group(1) if src_m else None))
          if not matches:
              print("::error::Cargo.lock has no libfreemkv entry")
              sys.exit(1)
          if len(matches) > 1:
              print(f"::error::Cargo.lock has {len(matches)} libfreemkv entries: {matches}")
              sys.exit(1)
          lock_ver, lock_src = matches[0]
          if lock_ver != tag:
              print(f"::error::Cargo.lock libfreemkv = {lock_ver} but tag is {tag}. "
                    f"Cause: cargo update --workspace was used instead of the rm+generate-lockfile recipe. "
                    f"Fix: rm Cargo.lock && cargo +1.86 generate-lockfile (with .cargo/config.toml temporarily disabled).")
              sys.exit(1)
          if not lock_src or not lock_src.startswith("registry+https://github.com/rust-lang/crates.io"):
              print(f"::error::Cargo.lock libfreemkv must come from crates.io registry, not local path. "
                    f"Run rm Cargo.lock && cargo generate-lockfile with [patch.crates-io] disabled. "
                    f"(saw source={lock_src!r})")
              sys.exit(1)
          print(f"Cargo.lock libfreemkv = {lock_ver} from {lock_src}")
          PY

  build:
    needs: verify
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          targets: ${{ matrix.target }}
      # Cache cargo registry + target/ across release runs. The
      # registry index download alone is ~30-60s per run; with the
      # cache it's near-zero on subsequent releases that don't bump
      # Cargo.lock. target/ caching also helps when the lockfile is
      # stable (frequent in our unified-version cadence).
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: autorip-release-${{ matrix.target }}

      - name: Install musl cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-x86-64-linux-gnu musl-tools

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-dev
          cargo install cross --version 0.2.5

      # 0.18.13: dropped the redundant `cargo check --locked` step.
      # `cargo build --release` below does typechecking already; the
      # check step was pure waste (~30-45s) and only saved time when
      # type errors were caught before the codegen pass — but on a
      # tagged release, the local precommit hook already caught those.

      - name: Build (native musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          export CC=x86_64-linux-gnu-gcc
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=x86_64-linux-gnu-gcc
          cd autorip && cargo build --locked --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          cd autorip && cross build --locked --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd autorip/target/${{ matrix.target }}/release
          tar czf "../../../autorip-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" autorip
          tar czf "../../../autorip-${{ matrix.target }}.tar.gz" autorip

      - name: Upload tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz

      # 0.18.13: hand the musl-static binary off to the docker job
      # via an artifact instead of having that job re-run the same
      # cargo build inside the Dockerfile. Saves the docker job ~1-2
      # min of duplicated compile work — it now just COPYs the
      # binary into a slim Debian base and pushes to GHCR.
      - name: Upload binary artifact for docker job
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: actions/upload-artifact@v4
        with:
          name: autorip-binary-${{ matrix.target }}
          path: autorip/target/${{ matrix.target }}/release/autorip
          retention-days: 1

   docker:
     needs: build
     runs-on: ubuntu-latest
     permissions:
       contents: read
       packages: write
     steps:
       - uses: actions/checkout@v5
         with:
           submodules: true

       # Pull the prebuilt musl binary from the build job into the
       # docker build context. Dockerfile.ci consumes ./autorip from
       # the context root (no in-container cargo build).
       - name: Download binary from build job
         uses: actions/download-artifact@v4
         with:
           name: autorip-binary-x86_64-unknown-linux-musl
           path: .

       - name: Log in to GHCR
         uses: docker/login-action@v3
         with:
           registry: ghcr.io
           username: ${{ github.actor }}
           password: ${{ secrets.GITHUB_TOKEN }}

       - name: Build and push Docker image
         uses: docker/build-push-action@v6
         with:
           context: .
           file: Dockerfile.ci
           push: true
           tags: |
             ghcr.io/freemkv/autorip:latest
             ghcr.io/freemkv/autorip:${{ github.ref_name }}

  # 0.18.13: only needs `verify` (the version-match check). It does
  # NOT need the binary, so it runs in parallel with `build` and
  # `docker` instead of blocking on either.
  update-homepage:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Update org README with new version
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORG_DISPATCH_TOKEN }}
          repository: freemkv/.github
          event-type: new-release
          client-payload: '{"version": "${{ github.ref_name }}"}'
