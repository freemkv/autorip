name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VER="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          if [ "$CARGO_VER" != "${{ github.ref_name }}" ]; then
            echo "::error::Cargo.toml says $CARGO_VER but tag is ${{ github.ref_name }}"
            exit 1
          fi
          echo "Version match: $CARGO_VER"

      - name: Verify Cargo.lock libfreemkv matches tag and is from crates.io
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          python3 - "$TAG_VER" <<'PY'
          import sys, re
          tag = sys.argv[1]
          try:
              with open("Cargo.lock") as f:
                  text = f.read()
          except FileNotFoundError:
              print("::error::Cargo.lock not found")
              sys.exit(1)
          if not text.strip():
              print("::error::Cargo.lock is empty or truncated")
              sys.exit(1)
          # Split into [[package]] blocks; defend against multiple libfreemkv entries.
          blocks = re.split(r'(?m)^\[\[package\]\]\s*$', text)
          matches = []
          for b in blocks:
              name_m = re.search(r'(?m)^name\s*=\s*"libfreemkv"\s*$', b)
              if not name_m:
                  continue
              ver_m = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', b)
              src_m = re.search(r'(?m)^source\s*=\s*"([^"]+)"\s*$', b)
              matches.append((ver_m.group(1) if ver_m else None,
                              src_m.group(1) if src_m else None))
          if not matches:
              print("::error::Cargo.lock has no libfreemkv entry")
              sys.exit(1)
          if len(matches) > 1:
              print(f"::error::Cargo.lock has {len(matches)} libfreemkv entries: {matches}")
              sys.exit(1)
          lock_ver, lock_src = matches[0]
          if lock_ver != tag:
              print(f"::error::Cargo.lock libfreemkv = {lock_ver} but tag is {tag}. "
                    f"Cause: cargo update --workspace was used instead of the rm+generate-lockfile recipe. "
                    f"Fix: rm Cargo.lock && cargo +1.86 generate-lockfile (with .cargo/config.toml temporarily disabled).")
              sys.exit(1)
          if not lock_src or not lock_src.startswith("registry+https://github.com/rust-lang/crates.io"):
              print(f"::error::Cargo.lock libfreemkv must come from crates.io registry, not local path. "
                    f"Run rm Cargo.lock && cargo generate-lockfile with [patch.crates-io] disabled. "
                    f"(saw source={lock_src!r})")
              sys.exit(1)
          print(f"Cargo.lock libfreemkv = {lock_ver} from {lock_src}")
          PY

  build:
    needs: verify
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-dev
          cargo install cross --version 0.2.5

      - name: Check
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: cargo check --locked

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --locked --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "../../../autorip-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" autorip
          tar czf "../../../autorip-${{ matrix.target }}.tar.gz" autorip

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz

  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/freemkv/autorip:latest
            ghcr.io/freemkv/autorip:${{ github.ref_name }}

  update-homepage:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Update org README with new version
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORG_DISPATCH_TOKEN }}
          repository: freemkv/.github
          event-type: new-release
          client-payload: '{"version": "${{ github.ref_name }}"}'
