name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VER="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          if [ "$CARGO_VER" != "${{ github.ref_name }}" ]; then
            echo "::error::Cargo.toml says $CARGO_VER but tag is ${{ github.ref_name }}"
            exit 1
          fi
          echo "Version match: $CARGO_VER"

      # The binary no longer pulls libfreemkv from crates.io — the committed
      # [patch.crates-io] in Cargo.toml redirects it (and the transitive ref
      # from freemkv-unlock-ld / freemkv-keysources) to a GIT TAG, so the build
      # starts the instant that tag exists instead of waiting on the crates.io
      # publish + index propagation. This check therefore asserts the Cargo.lock
      # libfreemkv comes from THIS release's git tag (git+...?tag=v<this>), not
      # from a crates.io registry source or a local path.
      - name: Verify Cargo.lock libfreemkv is from the expected git tag
        run: |
          TAG="${{ github.ref_name }}"
          python3 - "$TAG" <<'PY'
          import sys, re
          tag = sys.argv[1]
          try:
              with open("Cargo.lock") as f:
                  text = f.read()
          except FileNotFoundError:
              print("::error::Cargo.lock not found")
              sys.exit(1)
          if not text.strip():
              print("::error::Cargo.lock is empty or truncated")
              sys.exit(1)
          # Split into [[package]] blocks; defend against multiple libfreemkv entries.
          blocks = re.split(r'(?m)^\[\[package\]\]\s*$', text)
          matches = []
          for b in blocks:
              if not re.search(r'(?m)^name\s*=\s*"libfreemkv"\s*$', b):
                  continue
              ver_m = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', b)
              src_m = re.search(r'(?m)^source\s*=\s*"([^"]+)"\s*$', b)
              matches.append((ver_m.group(1) if ver_m else None,
                              src_m.group(1) if src_m else None))
          if not matches:
              print("::error::Cargo.lock has no libfreemkv entry")
              sys.exit(1)
          if len(matches) > 1:
              print(f"::error::Cargo.lock has {len(matches)} libfreemkv entries "
                    f"(direct + transitive not unified by the [patch.crates-io] git redirect): {matches}")
              sys.exit(1)
          lock_ver, lock_src = matches[0]
          expected = f"?tag={tag}"
          if not lock_src or "git+https://github.com/freemkv/libfreemkv" not in lock_src:
              print(f"::error::Cargo.lock libfreemkv must come from the libfreemkv git repo, "
                    f"not crates.io or a local path. Regenerate with the release script "
                    f"(the committed [patch.crates-io] redirects it to the git tag). "
                    f"(saw source={lock_src!r})")
              sys.exit(1)
          if expected not in lock_src:
              print(f"::error::Cargo.lock libfreemkv git source is {lock_src!r} but this "
                    f"release tag is {tag}; expected the source to pin {expected}. "
                    f"The release script must re-pin the [patch.crates-io] tag before regen.")
              sys.exit(1)
          print(f"Cargo.lock libfreemkv = {lock_ver} from {lock_src} (OK)")
          PY

  # Tests run as a PARALLEL TRIPWIRE: they fail the run if they fail, but the
  # build/docker jobs do NOT `needs:` this job, so artifact build starts
  # immediately rather than serializing behind the test suite. The tag decision
  # was already gated by the local precommit (same Rust 1.86, same commit) — CI
  # tests here are a safety net, not the gate.
  test:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: autorip-release-test
      - name: Install musl cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-x86-64-linux-gnu musl-tools
      - name: Test
        run: |
          export CC=x86_64-linux-gnu-gcc
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=x86_64-linux-gnu-gcc
          export CFLAGS="-U_FORTIFY_SOURCE"
          cargo test --locked --target x86_64-unknown-linux-musl

  build:
    # NOTE: deliberately does NOT `needs: test` — see the test job above.
    # Tests are a parallel tripwire; the build starts the moment `verify` passes.
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        # x86_64-apple-darwin is intentionally dropped: it has a pre-existing
        # linker issue on the macOS runners and built nothing (a no-op leg that
        # only added wall-clock to the matrix). aarch64-apple-darwin covers
        # macOS. If x86_64 macOS support is ever needed, fix the linker first.
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset: autorip-x86_64-linux
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset: autorip-aarch64-linux
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: autorip-aarch64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: autorip-x86_64-windows.zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          targets: ${{ matrix.target }}
      # Cache cargo registry + target/ across release runs. The
      # registry index download alone is ~30-60s per run; with the
      # cache it's near-zero on subsequent releases that don't bump
      # Cargo.lock. target/ caching also helps when the lockfile is
      # stable (frequent in our unified-version cadence).
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: autorip-release-${{ matrix.target }}

      - name: Install musl cross-compilation tools
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-x86-64-linux-gnu musl-tools

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          # Download the prebuilt cross binary (matches the freemkv workflow).
          # `cargo install cross` fails here because the rust-toolchain action
          # pins a target-only toolchain and building cross from source is both
          # slow and flaky on the runner.
          curl -sL https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv cross /usr/local/bin/

      # The per-target test step was removed from the build matrix: tests now
      # run once in the dedicated parallel `test` job, off the build critical
      # path. (0.18.13 had already dropped the redundant `cargo check --locked`.)

      - name: Build (native musl with x86_64-linux-gnu-gcc)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          export CC=x86_64-linux-gnu-gcc
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=x86_64-linux-gnu-gcc
          # Ubuntu's GCC defaults to -D_FORTIFY_SOURCE=2, which makes
          # mimalloc-sys (a transitive C dep) emit calls to glibc-only
          # __memcpy_chk / __memset_chk that are absent from musl. The
          # final static-pie link against musl then fails with
          # "undefined reference". Disable fortify for the C portion
          # of the build; the Rust code is unaffected.
          export CFLAGS="-U_FORTIFY_SOURCE"
          cargo build --locked --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --locked --release --target ${{ matrix.target }}

      # macOS (aarch64) and Windows build natively on their own runners — no
      # cross toolchain. libfreemkv's IOKit (macOS) and SPTI (Windows) SCSI
      # transports compile here; autorip's Linux-only service glue (udev
      # rip-on-insert, container bootstrap) is cfg-gated so `serve` runs on
      # every platform via the polling drive watcher.
      - name: Build (native, macOS/Windows)
        if: runner.os != 'Linux'
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          # Versioned + unversioned tarballs (existing convention).
          tar czf "../../../autorip-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" autorip
          tar czf "../../../autorip-${{ matrix.target }}.tar.gz" autorip
          cd ../../..
          # Plain, runnable binary asset (download → chmod +x → run).
          cp "target/${{ matrix.target }}/release/autorip" "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}"
          # sha256 checksums for every asset this matrix leg uploads.
          shasum -a 256 \
            "autorip-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" \
            "autorip-${{ matrix.target }}.tar.gz" \
            "${{ matrix.asset }}" \
            > "${{ matrix.asset }}.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Windows ships as a .zip ONLY (no bare .exe). Versioned + unversioned,
          # mirroring the Unix tarball convention; ${{ matrix.asset }} is the
          # unversioned .zip the download page links.
          Compress-Archive -Path "target/${{ matrix.target }}/release/autorip.exe" -DestinationPath "autorip-${{ github.ref_name }}-x86_64-windows.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/autorip.exe" -DestinationPath "${{ matrix.asset }}"
          $h = Get-FileHash -Algorithm SHA256 "${{ matrix.asset }}"
          "$($h.Hash.ToLower())  ${{ matrix.asset }}" | Out-File -Encoding ascii "${{ matrix.asset }}.sha256"

      # Per-target artifacts upload as each matrix leg finishes (fail-fast:
      # false), so a "released" binary for a fast target isn't gated on the
      # slowest one.
      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

      # 0.18.13: hand the musl-static binary off to the docker job
      # via an artifact instead of having that job re-run the same
      # cargo build inside the Dockerfile. Saves the docker job ~1-2
      # min of duplicated compile work — it now just COPYs the
      # binary into a slim Debian base and pushes to GHCR.
      - name: Upload binary artifact for docker job
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: actions/upload-artifact@v4
        with:
          name: autorip-binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/autorip
          retention-days: 1

  docker:
    # Only needs the x86_64 musl binary artifact (produced by `build`); it does
    # NOT need the test job or the slower macOS/Windows legs. As soon as the
    # Linux build leg finishes, the GHCR image starts.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      # Pull the prebuilt musl binary from the build job into the
      # docker build context. Dockerfile.ci consumes ./autorip from
      # the context root (no in-container cargo build).
      - name: Download binary from build job
        uses: actions/download-artifact@v4
        with:
          name: autorip-binary-x86_64-unknown-linux-musl
          path: .

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: |
            ghcr.io/freemkv/autorip:latest
            ghcr.io/freemkv/autorip:${{ github.ref_name }}

  # 0.18.13: only needs `verify` (the version-match check). It does
  # NOT need the binary, so it runs in parallel with `build` and
  # `docker` instead of blocking on either.
  update-homepage:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Update org README with new version
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORG_DISPATCH_TOKEN }}
          repository: freemkv/.github
          event-type: new-release
          client-payload: '{"version": "${{ github.ref_name }}"}'
