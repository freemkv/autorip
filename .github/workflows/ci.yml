name: CI

on:
  push:
    branches: [main]
  pull_request:

# autorip depends on libfreemkv from crates.io (see Cargo.toml).
# No sibling-repo checkout is needed.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --locked -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.86.0
      - run: cargo test --locked --tests

  # autorip targets Linux only (disc access via /dev/sg*)
  # Windows check removed — freemkv CLI covers cross-platform
